name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ubuntu-latest = ubuntu-24 which breaks NDK r25b + Kivy

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf \
          automake \
          libtool \
          libltdl-dev \
          pkg-config \
          libffi-dev \
          m4 \
          openjdk-17-jdk

    - name: Install Python build tools
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.37
        pip install buildozer
        buildozer --version

    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        yes | buildozer android debug 2>&1 | tee build.log

    - name: Find APK
      if: always()
      run: find . -name "*.apk" 2>/dev/null || echo "No APKs found"

    - name: Prepare APK
      run: |
        mkdir -p output
        find bin/ -name "*.apk" -exec cp {} output/ \; 2>/dev/null || true
        find .buildozer -name "*.apk" -exec cp {} output/ \; 2>/dev/null || true
        ls -la output/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-apk
        path: output/*.apk

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: build.log