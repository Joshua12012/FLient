name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ubuntu-latest = ubuntu-24 which breaks NDK r25b + Kivy

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libunwind-dev
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          autoconf \
          automake \
          libtool \
          libltdl-dev \
          pkg-config \
          libffi-dev \
          m4 \
          openjdk-17-jdk

    - name: Install Python build tools
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.37
        pip install buildozer
        buildozer --version

    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        yes | buildozer android debug 2>&1 | tee build.log

    # 🔍 DEBUG: Find APK location (always run)
    - name: Find APK
      if: always()
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo "=== bin/ directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        echo "=== .buildozer/ directory ==="
        find .buildozer -name "*.apk" -type f 2>/dev/null || echo "No APK in .buildozer"

    # ✅ Prepare APK for upload (always run to ensure we capture it)
    - name: Prepare APK
      if: always()
      run: |
        mkdir -p output
        
        # Copy from all possible locations
        find bin/ -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null || true
        find .buildozer -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null || true
        
        echo "=== Final output folder ==="
        ls -la output/
        echo "=== APK files count ==="
        ls output/*.apk 2>/dev/null | wc -l

    # ✅ Upload APK (always try, even if build had warnings)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-apk
        path: output/*.apk
        if-no-files-found: warn
        retention-days: 5

    # 📄 Upload build log for debugging
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 5