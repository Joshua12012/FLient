name: Build Android APK

on:
  push:
    branches: [ main, mobile-kiwi-app ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04  # Use older Ubuntu for compatibility
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-pip openjdk-11-jdk autoconf automake libtool libffi-dev
        pip install buildozer==1.4.0 cython==0.29.33
    
    - name: Build APK
      run: |
        buildozer android debug
      env:
        ANDROID_NDK: r21e  # Use older NDK that works
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: bin/*.apk
